<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Oracle Mentor Match</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="demo-shell">
      <aside class="side-panel" aria-label="Demo controls">
        <div class="brand-block">
          <img src="/mentor-match-collage.png" alt="" class="brand-image">
          <p class="eyebrow">Oracle Mentor Match</p>
          <h1>Mentorship discovery for the next career move.</h1>
        </div>

        <section class="panel-section" aria-labelledby="personaHeading">
          <div class="section-title">
            <h2 id="personaHeading">Persona</h2>
            <button class="text-button" id="resetButton" type="button">Reset demo</button>
          </div>
          <div class="persona-list" id="personaList"></div>
        </section>

        <section class="panel-section" aria-labelledby="metricsHeading">
          <h2 id="metricsHeading">Snapshot</h2>
          <div class="metric-grid" id="metricGrid"></div>
        </section>
      </aside>

      <section class="phone-stage" aria-label="Mobile app preview">
        <div class="phone-frame">
          <header class="app-header">
            <div>
              <span class="app-kicker">Mentor Match</span>
              <h2 id="screenTitle">Discover</h2>
            </div>
            <button class="active-persona" id="activePersonaButton" type="button"></button>
          </header>

          <section class="screen" id="screen" aria-live="polite"></section>

          <nav class="tabbar" aria-label="Primary">
            <button class="tab-button active" type="button" data-view="discover">
              <span aria-hidden="true">+</span>
              <strong>Discover</strong>
            </button>
            <button class="tab-button" type="button" data-view="matches">
              <span aria-hidden="true">=</span>
              <strong>Matches</strong>
            </button>
            <button class="tab-button" type="button" data-view="chat">
              <span aria-hidden="true">&gt;</span>
              <strong>Chat</strong>
            </button>
            <button class="tab-button" type="button" data-view="profile">
              <span aria-hidden="true">*</span>
              <strong>Profile</strong>
            </button>
          </nav>
        </div>
      </section>
    </main>

    <div class="toast" id="toast" role="status"></div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
